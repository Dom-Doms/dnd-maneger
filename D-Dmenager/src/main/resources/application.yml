# src/main/resources/application.yml
server:
  port: ${SERVER_PORT:8080}
  address: 0.0.0.0

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/dd_manager}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:admin}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

app:
  upload:
    dir: ${APP_UPLOAD_DIR:uploads}
  jwt:
    secret: ${APP_JWT_SECRET:change-me-dev-secret}
    expiration-seconds: ${APP_JWT_EXPIRATION_SECONDS:3600}
