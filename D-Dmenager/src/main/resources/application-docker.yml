server:
  port: 8080
  address: 0.0.0.0

spring:
  datasource:
    url: jdbc:postgresql://postgres:5432/dd_manager
    username: dd_user
    password: dd_password
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    database-platform: org.hibernate.dialect.PostgreSQLDialect

app:
  jwt:
    secret: cambia-questa-stringa-lunga-in-produzione
    expiration-seconds: 3600