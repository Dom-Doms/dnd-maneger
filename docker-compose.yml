services:
  postgres:
    image: postgres:16-alpine
    container_name: dnd-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: dd_manager
      POSTGRES_USER: dd_user
      POSTGRES_PASSWORD: dd_password
    volumes:
      - dnd_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dd_user -d dd_manager"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./D-Dmenager
    container_name: dnd-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./D-Dmenager-Front
      args:
        VITE_API_BASE_URL: https://api-dnd.gesu.gay
    container_name: dnd-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8081:80"

volumes:
  dnd_postgres_data: