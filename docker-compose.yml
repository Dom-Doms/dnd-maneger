services:
  postgres:
    image: postgres:16-alpine
    container_name: dnd-postgres
    environment:
      POSTGRES_DB: dd_manager
      POSTGRES_USER: dnd_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dnd_password}
    volumes:
      - dnd_postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dnd-backend
    depends_on:
      - postgres
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/dd_manager
      SPRING_DATASOURCE_USERNAME: dnd_user
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-dnd_password}
      APP_JWT_SECRET: ${APP_JWT_SECRET:-dev-super-secret-change-me}
      APP_UPLOAD_DIR: /app/uploads
    volumes:
      - dnd_uploads:/app/uploads
    ports:
      - "8080:8080"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8080}
    container_name: dnd-frontend
    depends_on:
      - backend
    ports:
      - "8081:80"
    restart: unless-stopped

volumes:
  dnd_postgres_data:
  dnd_uploads:
